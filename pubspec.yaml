name: whispr
description: Natural-language reminder app with AI parsing pipeline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ----- State management -----
  flutter_riverpod: ^2.5.1

  # ----- Local storage -----
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ----- Navigation -----
  go_router: ^13.2.0

  # ----- AI / Network -----
  http: ^1.2.1

  # ----- Audio recording -----
  # record: cross-platform mic recording, produces an audio file for upload.
  record: ^5.1.1
  # path_provider: needed to choose a temp directory for the audio file.
  path_provider: ^2.1.3

  # ----- Notifications -----
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # ----- Calendar / UI -----
  table_calendar: ^3.1.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ----- Utilities -----
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  hive_generator: ^2.0.1

# record_linux 0.7.2 is missing startStream + has wrong hasPermission signature
# relative to record_platform_interface 1.5.x. We use a local patched copy that
# adds the two missing stubs so the Dart compiler is satisfied on all platforms.
dependency_overrides:
  record_linux:
    path: packages/record_linux


flutter:
  uses-material-design: true

  # Notification sound assets (Section 7.1a).
  # Place your sound files here and register them below.
  assets:
    - assets/sounds/whispr_chime.caf    # iOS (.caf or .aiff, under 30 s)
    - assets/sounds/whispr_chime.ogg    # Android (.ogg or .mp3, under 5 s)
